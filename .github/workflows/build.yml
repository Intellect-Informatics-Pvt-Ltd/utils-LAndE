name: Build and Push NuGet Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      pack_all:
        description: Pack every src project for verification.
        required: true
        type: boolean
        default: true
      push_packages:
        description: Publish generated packages to GitHub Packages.
        required: true
        type: boolean
        default: false
      version:
        description: Optional package version override, for example 1.0.0-preview.1.
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GITHUB_OWNER: ${{ github.repository_owner }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
      PACK_ALL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pack_all || 'true' }}
      PUSH_PACKAGES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_packages || 'true' }}
      NEW_VERSION: ${{ github.event.inputs.version || '' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Perform a full clone

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Adjust the version as per your project's requirement

    - name: Run build script
      shell: bash
      run: bash ./build_push_script.sh

    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: artifacts/nuget/*.nupkg
        if-no-files-found: warn
